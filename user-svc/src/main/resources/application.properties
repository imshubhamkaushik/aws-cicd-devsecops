spring.application.name=user-svc
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ---------------------------------------------------------------------------
# ddl-auto=validate: Hibernate checks that the DB schema matches entity
# definitions at startup but never alters the schema itself.
# "update" was removed because it silently mutates production tables on every
# rolling deployment — it cannot drop columns, leaving orphaned fields forever,
# and has no transaction guarantee (a mid-startup crash leaves the schema
# in a partially migrated, inconsistent state).
# Schema changes must go through Flyway migration scripts (src/main/resources/db/migration/).
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.sql.init.mode=never

# ---------------------------------------------------------------------------
# Flyway — enabled for user-svc.
# The init container in user.yaml runs `flyway repair` before the app pod
# starts, so any checksum mismatch caused by editing an already-applied
# migration is resolved automatically before Spring Boot attempts validation.
#
# out-of-order=false  : migrations must be applied in version order (safe default).
# baseline-on-migrate : only needed if the schema already exists without a
#                       flyway_schema_history table (first-time Flyway adoption).
#                       Set to true once, then revert to false after the first deploy.
# ---------------------------------------------------------------------------

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.baseline-on-migrate=false

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
# In Spring Boot 3, endpoints are usually enabled by default. The new access property controls permission levels. read_only is the standard replacement for "enabled".
management.endpoint.prometheus.access=read_only
management.endpoint.health.show-details=always

# The configuration hierarchy was reorganized to group properties by the monitoring system (Prometheus) rather than the function (metrics.export).
management.prometheus.metrics.export.enabled=true
management.server.port=8081
management.health.db.enabled=true

# Enable histogram buckets
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Explicitly enable distribution statistics
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,300ms,500ms,1s,2s,5s

management.metrics.distribution.minimum-expected-value.http.server.requests=10ms
management.metrics.distribution.maximum-expected-value.http.server.requests=10s