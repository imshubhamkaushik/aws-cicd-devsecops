global:
  imageRegistry: ""
  imageTag: "latest"
  cloudProvider: "aws"

database:
  host: ""
  port: 5432
  name: "catalogix"
  username: "catalogix"

ingress:
  enabled: true
  host: ""
  paths:
    frontend: /
    users: /users
    products: /products

frontendSvc:
  image:
    repository: "frontend-svc"
    pullPolicy: "IfNotPresent"
  replicaCount: 2
  service:
    type: "ClusterIP"
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

userSvc:
  image:
    repository: "user-svc"
    pullPolicy: "IfNotPresent"
  replicaCount: 2
  service:
    port: 8081
    targetPort: 8081
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    ALLOWED_ORIGINS: "*"

productSvc:
  image:
    repository: "product-svc"
    pullPolicy: "IfNotPresent"
  replicaCount: 2
  service:
    port: 8082
    targetPort: 8082
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    ALLOWED_ORIGINS: "*"

monitoring:
  enabled: true

aws:
  accountId: ""
  region: "ap-south-1"