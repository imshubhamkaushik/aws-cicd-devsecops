global:
  imageRegistry: ""
  imageTag: "latest"
  cloudProvider: "aws"

database:
  host: ""
  port: 5432
  name: "catalogix"
  username: "catalogix"  # username must match the RDS master username set in Terraform (local.db_username = "catalogix")

# DB password is NOT stored here. It is pulled from AWS Secrets Manager by the
# ExternalSecret template and placed into the 'catalogix-secrets' Kubernetes Secret.
secretsManager:
  secretName: "catalogix-dev/db-credentials"

ingress:
  enabled: true
  host: ""
  paths:
    frontend: /
    users: /users
    products: /products

frontendSvc:
  image:
    repository: "frontend-svc"
    pullPolicy: "IfNotPresent"
  replicaCount: 2
  service:
    type: "ClusterIP"
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  hpa:
    minReplicas: 2
    maxReplicas: 4
    cpuUtilization: 75

userSvc:
  image:
    repository: "user-svc"
    pullPolicy: "IfNotPresent"
  replicaCount: 2
  service:
    port: 8081
    targetPort: 8081
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    ALLOWED_ORIGINS: "*"
  hpa:
    minReplicas: 2
    maxReplicas: 4
    cpuUtilization: 75

productSvc:
  image:
    repository: "product-svc"
    pullPolicy: "IfNotPresent"
  replicaCount: 2
  service:
    port: 8082
    targetPort: 8082
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    ALLOWED_ORIGINS: "*"
  hpa:
    minReplicas: 2
    maxReplicas: 4
    cpuUtilization: 75

hpa:
  enabled: true

monitoring:
  enabled: true

aws:
  accountId: ""
  region: "ap-south-1"