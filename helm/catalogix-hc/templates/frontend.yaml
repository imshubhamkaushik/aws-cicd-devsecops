apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-svc
  labels:
    app: frontend-svc
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.frontendSvc.replicaCount | default 2 }}
  {{- end }}
  selector:
    matchLabels:
      app: frontend-svc
  template:
    metadata:
      labels:
        app: frontend-svc
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend-svc
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.frontendSvc.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.frontendSvc.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontendSvc.service.port | default 80 }}
          resources: {{ toYaml .Values.frontendSvc.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-log
              mountPath: /var/log/nginx
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # NET_BIND_SERVICE allows a non-root process to bind port 80.
              # This is the minimum required capability — all others remain dropped.
              # Port 8080 is reserved for Jenkins in this environment, so we keep nginx on port 80 and grant only this one capability instead of switching to an unprivileged image on 8080.
              add:
                - NET_BIND_SERVICE
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  labels:
    app: frontend-svc
spec:
  type: {{ .Values.frontendSvc.service.type | default "ClusterIP" }}
  selector:
    app: frontend-svc
  ports:
    - protocol: TCP
      port: {{ .Values.frontendSvc.service.port }}
      targetPort: {{ .Values.frontendSvc.service.port }}