apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-svc
  labels:
    app: product-svc
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.productSvc.replicaCount | default 2 }}
  {{- end }}
  selector:
    matchLabels:
      app: product-svc
  template:
    metadata:
      labels:
        app: product-svc
    spec:
      securityContext:
        runAsNonRoot: true

      initContainers:
        # ── Step 1: Copy SQL files from the dedicated migrations image ────────
        # Uses product-svc-migrations:IMAGE_TAG — a tiny Alpine image (~8 MB) built
        # from the same Dockerfile as product-svc (--target migrations) and pushed
        # to ECR with the same tag. Because both images are built from the same
        # source tree in the same pipeline run they are always version-locked.
        #
        # This init container has a shell (Alpine) so cp works correctly.
        # The distroless app image is never used as an init container.
        - name: copy-migrations
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.productSvc.migrations.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.productSvc.image.pullPolicy }}
          command: ["sh", "-c", "cp -r /flyway/sql/. /shared/sql/"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: flyway-migrations
              mountPath: /shared/sql
            - name: tmp-volume
              mountPath: /tmp
        
        # ── Step 2: Repair flyway_schema_history before Spring Boot starts ────
        # `flyway repair` updates the checksum stored in flyway_schema_history
        # to match the current local SQL file. Resolves the
        # "Migration checksum mismatch" crash automatically on every pod start.
        # No-op when checksums already match — adds ~1-2 s on a clean deploy.
        - name: flyway-repair
          image: flyway/flyway:10.21.0-alpine
          args: ["repair"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: FLYWAY_URL
              value: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            - name: FLYWAY_USER
              value: "{{ .Values.database.username }}"
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalogix-secrets
                  key: DB_PASSWORD
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/sql"
          volumeMounts:
            - name: flyway-migrations
              mountPath: /flyway/sql
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
              
      containers:
        - name: product-svc
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.productSvc.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.productSvc.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.productSvc.service.port | default 8082 }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.database.username }}"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalogix-secrets
                  key: DB_PASSWORD
            - name: ALLOWED_ORIGINS
              value: "{{ .Values.productSvc.env.ALLOWED_ORIGINS }}"
          resources: {{ toYaml .Values.productSvc.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.productSvc.service.targetPort | default 8082 }}
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.productSvc.service.targetPort | default 8082 }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.productSvc.service.targetPort | default 8082 }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: flyway-migrations
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: product-svc
  labels:
    app: product-svc
spec:
  type: {{ .Values.productSvc.service.type | default "ClusterIP" }}
  selector:
    app: product-svc
  ports:
    - name: http
      port: {{ .Values.productSvc.service.port | default 8082 }}
      targetPort: {{ .Values.productSvc.service.targetPort | default 8082 }}