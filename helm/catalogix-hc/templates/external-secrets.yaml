# ExternalSecret — tells the External Secrets Operator to create and maintain
# the 'catalogix-secrets' Kubernetes Secret by pulling values from AWS Secrets Manager.
#
# This replaces the manual `kubectl create secret` step that was previously in the
# Jenkins pipeline. ESO refreshes the secret every hour automatically.
#
# The pod templates in user.yaml and product.yaml reference catalogix-secrets by name,
# so no changes are needed there — the secret name stays the same.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: catalogix-db-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager   # ClusterSecretStore created by the eso Terraform module
    kind: ClusterSecretStore

  target:
    name: catalogix-secrets     # Name of the Kubernetes Secret to create/maintain
    creationPolicy: Owner       # ESO owns the secret — deletes it if this ExternalSecret is deleted

  data:
    - secretKey: DB_PASSWORD    # Key inside the Kubernetes Secret
      remoteRef:
        key: {{ .Values.secretsManager.secretName }}  # AWS Secrets Manager secret name
        property: db_pass       # Key inside the JSON secret value