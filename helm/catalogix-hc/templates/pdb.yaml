{{- if .Values.hpa.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-svc-pdb
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-svc
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: product-svc-pdb
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: product-svc
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-svc-pdb
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend-svc
{{- end }}