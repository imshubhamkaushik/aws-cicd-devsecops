  namespace: {{ .Release.Namespace }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: product-svc
{{- end }}
---
{{- if or (and .Values.hpa .Values.hpa.enabled) (gt (.Values.frontendSvc.replicaCount | int) 1) }}
apiVersion: policy/v1
