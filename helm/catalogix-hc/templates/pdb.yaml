{{- if or (and .Values.hpa .Values.hpa.enabled) (gt (.Values.userSvc.replicaCount | int) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-svc-pdb
  namespace: {{ .Release.Namespace }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: user-svc
{{- end }}
---
{{- if or (and .Values.hpa .Values.hpa.enabled) (gt (.Values.productSvc.replicaCount | int) 1) }}
apiVersion: policy/v1
