apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    # NOTE:
    # Monitoring is infrastructure, not user-facing. Internal ALB prevents accidental public exposure.

    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/group.name: monitoring
    # HIGHLIGHT:
    # Secure-by-default access (VPN / bastion / private DNS).
    # DEV ACCESS — use port-forward without needing DNS:
    #   kubectl port-forward svc/monitoring-grafana 3000:3000 -n monitoring
    #   kubectl port-forward svc/monitoring-kube-prometheus-stack-prometheus 9090:9090 -n monitoring
    #   kubectl port-forward svc/monitoring-kube-prometheus-stack-alertmanager 9093:9093 -n monitoring
    # PRODUCTION — to enable hostname-based access via this ingress:
    #   1. Create a Route53 private hosted zone for the VPC (e.g., internal.catalogix.com)
    #   2. Create A alias records pointing to this internal ALB
    #   3. Optionally install External DNS to automate record creation
spec:
  ingressClassName: alb
  rules:
    - host: grafana.internal.catalogix.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 3000

    - host: prometheus.internal.catalogix.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-stack-prometheus
                port:
                  number: 9090

    - host: alertmanager.internal.catalogix.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-stack-alertmanager
                port:
                  number: 9093
