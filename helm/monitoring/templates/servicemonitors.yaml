apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: catalogix-services
  namespace: {{ .Release.Namespace }}
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.global.targetNamespace | default "catalogix" }}
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - user-svc
          - product-svc
          # frontend-svc is excluded: nginx does not expose /actuator/prometheus.
          # Add it here if a metrics endpoint is added to the frontend image.
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s