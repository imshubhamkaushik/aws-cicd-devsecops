---
# =============================================================================
# HOW THIS PLAYBOOK IS EXECUTED
# =============================================================================
#
# ansible.py calls ansible-playbook TWO times with --limit — two phases, two
# separate OS processes. Phase 1 has two steps inside it (both run in the same subprocess); Phase 2 is Jenkins alone, in its own subprocess. 
# The "Phase 1 step 1/2" labels below describe POSITION WITHIN PHASE 1, not a third top-level phase — there are only ever two subprocess calls.
#
# Phase 1  --limit all:!jenkins   (everything except Jenkins)
#   Step 1: the 'all' play (common + docker) on every host the limit allows
#           — i.e. the SonarQube host only, since Jenkins is excluded here.
#   Step 2: the 'sonarqube' play — generates vault_sonar_token and writes
#           it into vault.yaml before this subprocess exits.
#   The '!jenkins' exclusion matters because 'jenkins' IS a subset of 'all':
#   without it, the baseline play would also run against the Jenkins host in this same subprocess, 
#   before vault_sonar_token exists — defeating the whole point of splitting Jenkins into its own later subprocess.
#
# Phase 2  --limit jenkins   (Jenkins only)
#   Fresh subprocess → vault.yaml re-read from disk → vault_sonar_token is
#   already populated (written during Phase 1) → Jenkins renders /etc/default/jenkins with a real SONARQUBE_TOKEN → sonarqube-token credential in JCasC has a real value. 
#   The baseline play (common + docker) also runs again here, scoped to the Jenkins host this time —
#   it never ran against that host during Phase 1, since the limit excluded it. 
#   Each host gets common+docker exactly once across the two phases combined; neither host gets it twice.
#
# WHY --limit AND NOT SEPARATE PLAYBOOK FILES:
#   One playbook file is easier to maintain and review. --limit scopes execution
#   to one group at runtime without duplicating role definitions across files.
#   Both approaches are valid; this one is simpler for a two-host setup.
#
# IDEMPOTENCY CONTRACT:
#   Every play and every role task must be safe to re-run without side effects.
#   Guards used throughout:
#     - state: present / started / directory (Ansible built-ins — always idempotent)
#     - when: some_check.rc != 0  (skip if already done)
#     - when: not token_in_vault  (skip vault write if token already exists)
#     - Webhook created only when name 'Jenkins' not found in existing list
# =============================================================================

# ── Phase 1, step 1 of 2: baseline packages + Docker ──────────────────────────
#
# hosts: all, but the active --limit (all:!jenkins during Phase 1, jenkins
# during Phase 2) means this play actually only ever touches ONE host per
# subprocess — see the header comment above for which host, when.
# Docker must be installed here because both the sonarqube role (container)
# and the jenkins role (jenkins user → docker group) depend on it.
#
# pre_tasks: handles Jenkins GPG key cleanup before the roles run.
# This is placed in the 'all' play (not the jenkins play) because the jenkins
# play runs in a separate subprocess where the pre_tasks would not target
# SonarQube anyway — but keeping it here ensures it runs exactly once, early.
- name: "Phase 1 — Baseline: common packages + Docker on all hosts"
  hosts: all
  become: true

  pre_tasks:
    # The Jenkins GPG key can go stale or be left in a bad state from a
    # previous failed run. Check validity before the jenkins role tries to
    # use it, and wipe stale files so the role can start clean.
    - name: Check if Jenkins GPG key is already valid
      shell: |
        gpg --no-default-keyring \
          --keyring /usr/share/keyrings/jenkins-keyring.gpg \
          --list-keys 7198F4B714ABFC68 2>/dev/null
      register: jenkins_key_check
      changed_when: false
      failed_when: false
      when: "'jenkins' in group_names"

    - name: Remove stale Jenkins repo and key files (only if key is missing/invalid)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/jenkins.list
        - /usr/share/keyrings/jenkins-keyring.gpg
        - /usr/share/keyrings/jenkins-keyring.asc
        - /usr/share/keyrings/jenkins.asc
      when:
        - "'jenkins' in group_names"
        - jenkins_key_check.rc != 0
  
  roles:
    - common
    - docker

# ── Phase 1, step 2 of 2: SonarQube ────────────────────────────────────────────
#
# Runs ONLY on the sonarqube host (enforced by --limit all:!jenkins in
# ansible.py — sonarqube is the only host that limit doesn't exclude). The
# sonarqube role:
#   1. Sets vm.max_map_count (required by Elasticsearch inside SonarQube).
#   2. Creates /opt/sonarqube data directories with correct ownership.
#   3. Starts the SonarQube container (community.docker.docker_container).
#   4. Waits for SonarQube to report status=UP.
#   5. Changes the default admin password (idempotent — skips if already changed).
#   6. Generates a user token named 'jenkins-token' in SonarQube.
#   7. Atomically writes vault_sonar_token into vault.yaml on the control node.
#   8. Creates the Jenkins webhook in SonarQube (idempotent).
#
# AFTER this play exits — and the Phase 1 subprocess exits with it —
# vault.yaml on disk contains vault_sonar_token. The Phase 2 subprocess reads it fresh at startup.
- name: "Phase 1, step 2 of 2 — SonarQube configuration"
  hosts: sonarqube
  become: true

  collections:
    - community.docker
  
  roles:
    - sonarqube

# ── Phase 2: Jenkins ────────────────────────────────────────────────────────────
#
# Runs ONLY on the jenkins host (enforced by --limit jenkins in ansible.py).
# This is a SEPARATE ansible-playbook subprocess — vault.yaml is re-read from
# disk at startup, so vault_sonar_token is already populated from Phase 1.
#
# The jenkins role:
#   1. Installs Java 21 (Jenkins requirement).
#   2. Adds Jenkins apt repo + GPG key (idempotent — skips if key valid).
#   3. Installs Jenkins.
#   4. Adds jenkins user to docker group.
#   5. Renders /etc/default/jenkins from jenkins_defaults.j2 — all secrets
#      are injected as environment variables so JCasC reads them via ${VAR}
#      syntax. vault_sonar_token is now a real value, not an empty string.
#   6. Deploys jcasc.yaml — configures admin user, SonarQube server,
#      GitHub + SonarQube credentials, and pipeline job definitions.
#   7. Starts Jenkins once (bare), installs plugins via jenkins-plugin-cli,
#      then does a full restart with JCasC active.
#   8. Triggers a JCasC reload via the Jenkins API.
#   9. Verifies admin login (HTTP 200 from /api/json) — confirms JCasC applied.
- name: "Phase 2 — Jenkins configuration"
  hosts: jenkins
  become: true
  
  roles:
    - devops-tools
    - jenkins