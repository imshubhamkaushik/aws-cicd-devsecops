---
# SonarQube's embedded Elasticsearch requires vm.max_map_count >= 524288.
- name: Set vm.max_map_count for Elasticsearch (required by SonarQube)
  sysctl:
    name: vm.max_map_count
    value: "524288"
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/99-sonarqube.conf

# Create SonarQube data directories
- name: Create Sonar directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "1000"
    group: "1000"
  loop:
    - /opt/sonarqube/data
    - /opt/sonarqube/logs
    - /opt/sonarqube/extensions

# Run SonarQube container
- name: Run SonarQube container
  # FQCN is required when the collection is installed via requirements.yml. The collection itself must be installed:
  #   ansible-galaxy collection install -r requirements.yml
  community.docker.docker_container:
    name: sonarqube
    image: sonarqube:26.3.0.120487-community
    state: started
    restart_policy: unless-stopped
    ports:
      - "9000:9000"
    env:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_WEB_JAVAOPTS: "-Xms256m -Xmx512m"
      SONAR_CE_JAVAOPTS: "-Xms256m -Xmx512m"
      SONAR_SEARCH_JAVAOPTS: "-Xms256m -Xmx512m"
    volumes:
      - /opt/sonarqube/data:/opt/sonarqube/data
      - /opt/sonarqube/logs:/opt/sonarqube/logs
      - /opt/sonarqube/extensions:/opt/sonarqube/extensions

# Wait for SonarQube to be up and running before finishing the playbook
- name: Wait for SonarQube to be healthy
  uri:
    url: "http://localhost:9000/api/system/status"
    method: GET
    status_code: 200
    return_content: yes
  register: sq_status
  until: sq_status.json is defined and sq_status.json.status == "UP"
  retries: 30
  delay: 10

- name: Wait for SonarQube to be reachable
  uri:
    url: "http://localhost:9000"
    status_code: 200
  register: sonar_status
  retries: 30
  delay: 10
  until: sonar_status.status == 200

# Change default admin password
- name: Change SonarQube admin password
  uri:
    url: "http://localhost:9000/api/users/change_password"
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: form-urlencoded
    body:
      login: admin
      previousPassword: admin
      password: "{{ sonar_admin_password }}"
  register: change_password
  failed_when: false

# Generate Sonar token
- name: Generate SonarQube token
  uri:
    url: "http://localhost:9000/api/user_tokens/generate"
    method: POST
    user: admin
    password: "{{ sonar_admin_password }}"
    force_basic_auth: yes
    body_format: form-urlencoded
    body:
      name: "jenkins-token"
  register: sonar_token_response
  when: sonar_token is not defined

# Store token as fact for later use (e.g. Jenkins configuration)
- name: Set Sonar token fact
  set_fact:
    sonar_token: "{{ sonar_token_response.json.token }}"
  when: sonar_token is not defined

# Debug (optional - remove later)
- name: Show Sonar token
  debug:
    msg: "Sonar Token: {{ sonar_token }}"

# Persist Sonar token to Vault
- name: Save Sonar token to vault file (first run only)
  delegate_to: localhost
  run_once: true
  when: sonar_token is defined
  block:

    - name: Write token to temp file
      copy:
        dest: /tmp/sonar_token.yml
        content: |
          sonar_token: "{{ sonar_token }}"

    - name: Decrypt vault file
      command: >
        ansible-vault decrypt ansible/group_vars/vault.yaml
        --vault-password-file {{ lookup('env','HOME') }}/.vault_pass

    - name: Append token to vault file
      shell: |
        grep -q "sonar_token:" ansible/group_vars/vault.yaml || \
        cat /tmp/sonar_token.yml >> ansible/group_vars/vault.yaml

    - name: Re-encrypt vault file
      command: >
        ansible-vault encrypt ansible/group_vars/vault.yaml
        --vault-password-file {{ lookup('env','HOME') }}/.vault_pass