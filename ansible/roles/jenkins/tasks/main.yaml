# This Ansible playbook installs Jenkins on an Ubuntu server.
# Installs Jenkins on Ubuntu with JCasC (Configuration-as-Code).
# The setup wizard is disabled — Jenkins self-configures on first boot
# via /etc/default/jenkins (env vars) + casc_configs/jcasc.yaml.
# No manual browser unlock is required.
---
- name: Install Java 21 (required by Jenkins)
  apt:
    name: openjdk-21-jdk
    state: present

# Creates the directory for storing apt keyrings if it doesn't already exist.
- name: Create apt keyrings directory
  file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

# Install Jenkins
# Check if Jenkins GPG keyring already exists
- name: Check if Jenkins GPG keyring already exists
  stat:
    path: /usr/share/keyrings/jenkins-keyring.gpg
  register: jenkins_key_check

# Download key and dearmor in one shot — avoids intermediate file trust issues.
# Use isolated GNUPGHOME to prevent gpg homedir permission issues when run as root.
# Skipped when the keyring file already exists (idempotent).
- name: Fetch Jenkins GPG key by fingerprint from keyserver
  shell: |
    set -e
    GNUPGHOME="$(mktemp -d)"
    trap "rm -rf $GNUPGHOME" EXIT

    gpg --homedir "$GNUPGHOME" --batch \
        --keyserver hkps://keyserver.ubuntu.com \
        --recv-keys 7198F4B714ABFC68

    gpg --homedir "$GNUPGHOME" --batch \
        --export 7198F4B714ABFC68 \
        > /tmp/jenkins-keyring-new.gpg

    test -s /tmp/jenkins-keyring-new.gpg \
      || { echo "ERROR: exported keyring is empty"; exit 1; }

    if ! diff -q /tmp/jenkins-keyring-new.gpg \
         /usr/share/keyrings/jenkins-keyring.gpg &>/dev/null; then
      cp /tmp/jenkins-keyring-new.gpg /usr/share/keyrings/jenkins-keyring.gpg
      echo "KEY_UPDATED"
    fi
  register: gpg_fetch_result
  changed_when: "'KEY_UPDATED' in gpg_fetch_result.stdout"

- name: Fix Jenkins key permissions
  file:
    path: /usr/share/keyrings/jenkins-keyring.gpg
    mode: "0644"

# Add the Jenkins apt repository to the system's sources list, referencing the imported GPG key for package verification.
- name: Add Jenkins apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins
    update_cache: no

# Update the apt cache to recognize the new Jenkins repository and its packages.
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

# Install the Jenkins package from the newly added repository, ensuring that the latest version is installed and the apt cache is updated beforehand.
- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes

# Add jenkins user to docker group
- name: Add jenkins user to docker group
  user:
    name: jenkins
    groups: docker
    append: yes
  notify: restart jenkins

# -----------------------------
# Ensure directories exist
# -----------------------------

- name: Ensure JCasC config directory exists
  file:
    path: /var/lib/jenkins/casc_configs
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"

- name: Ensure plugins directory exists
  file:
    path: /var/lib/jenkins/plugins
    state: directory
    owner: jenkins
    group: jenkins

# -----------------------------
# Copy required files
# -----------------------------
- name: Copy plugins.yaml
  copy:
    src: plugins.yaml
    dest: /tmp/plugins.yaml

- name: Download jenkins-plugin-manager.jar
  get_url:
    url: "https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.12.13/jenkins-plugin-manager-2.12.13.jar"
    dest: /usr/local/lib/jenkins-plugin-manager.jar
    mode: "0644"

- name: Install jenkins-plugin-cli wrapper script
  copy:
    dest: /usr/local/bin/jenkins-plugin-cli
    mode: "0755"
    content: |
      #!/bin/bash
      exec java -jar /usr/local/lib/jenkins-plugin-manager.jar "$@"

- name: Configure Jenkins environment file
  template:
    src: jenkins_defaults.j2
    dest: /etc/default/jenkins
    mode: "0644"
  notify: restart jenkins

# JCasC (Jenkins Configuration as Code) setup
# Deploy JCasC config file to Jenkins server
- name: Deploy JCasC config file to Jenkins server
  ansible.builtin.template:
    src: jcasc.yaml
    dest: /var/lib/jenkins/casc_configs/jcasc.yaml
    owner: jenkins
    group: jenkins
    mode: "0644"

# Ensure correct permissions
- name: Fix Jenkins home directory permissions
  file:
    path: "{{ item }}"
    owner: jenkins
    group: jenkins
    state: directory
  loop:
    - /var/lib/jenkins/casc_configs
    - /var/lib/jenkins/plugins

# -----------------------------
# CRITICAL: systemd must load env
# -----------------------------

- name: Ensure systemd override directory exists
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory

- name: Configure systemd to set Jenkins environment variables
  copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      # Load all JCasC environment variables and secrets
      EnvironmentFile=/etc/default/jenkins

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Install required packages for plugin downloads
  apt:
    name:
      - ca-certificates
      - curl
      - wget
    state: present

# -----------------------------
# Initialize Jenkins once BEFORE plugin install
# (Prevents plugin install race condition)
# -----------------------------
- name: Check if Jenkins plugins already installed
  find:
    paths: /var/lib/jenkins/plugins
    patterns: "configuration-as-code.*pi"
  register: casc_plugin_check

- name: Start Jenkins once to initialize home
  service:
    name: jenkins
    state: started
  when: casc_plugin_check.matched == 0

- name: Wait for initial Jenkins startup
  wait_for:
    port: 8080
    delay: 10
    timeout: 120
  when: casc_plugin_check.matched == 0

- name: Stop Jenkins before plugin install
  service:
    name: jenkins
    state: stopped
  when: casc_plugin_check.matched == 0

# -----------------------------
# Install plugins
# -----------------------------
- name: Install Jenkins plugins
  shell: |
    set -e
    jenkins-plugin-cli \
      --war /usr/share/java/jenkins.war \
      --plugin-file /tmp/plugins.yaml \
      --plugin-download-directory /var/lib/jenkins/plugins
  register: plugin_install_output
  changed_when: "'skipped' not in plugin_install_output.stdout"
  when: casc_plugin_check.matched == 0

- name: Fix Jenkins plugin directory ownership
  file:
    path: /var/lib/jenkins/plugins
    owner: jenkins
    group: jenkins
    recurse: yes

- name: Show plugin install output
  debug:
    var: plugin_install_output.stdout_lines
  when: plugin_install_output is not skipped and plugin_install_output is defined

- name: Show plugin install errors
  debug:
    var: plugin_install_output.stderr_lines
  when: plugin_install_output is not skipped and plugin_install_output is defined

# -----------------------------
# Verify JCasC plugin exists
# -----------------------------
- name: Check JCasC plugin (.jpi or .hpi)
  shell: |
    ls /var/lib/jenkins/plugins | grep configuration-as-code || true
  register: casc_check
  changed_when: false

- name: Fail if JCasC plugin missing
  fail:
    msg: "JCasC plugin not installed"
  when: casc_check.stdout == ""

# -----------------------------
# Start Jenkins after full setup
# -----------------------------
- name: Start Jenkins after full setup
  service:
    name: jenkins
    state: started
    enabled: yes

# Flush handlers HERE — not at end-of-play — so Jenkins restarts (if config
# changed) BEFORE the wait tasks run. Without this, the handler would fire
# after all the wait/verify tasks have passed, leaving Jenkins in an
# unverified post-restart state.
- name: Flush handlers (restart Jenkins now if config changed)
  meta: flush_handlers

# Jenkins Unlock & First-Time Setup
# Wait for Jenkins to start and listen on port 8080 before proceeding.
- name: Wait for Jenkins to start and listen on port 8080
  wait_for:
    port: 8080
    delay: 5
    timeout: 300

- name: Wait for Jenkins web UI to respond (HTTP 200)
  uri:
    url: "http://localhost:8080/login"
    status_code: 200
  register: jenkins_ui
  retries: 30
  delay: 5
  until: jenkins_ui.status == 200

# ONLY NOW reload — Jenkins is up with new token in memory
- name: Reload JCasC configuration
  uri:
    url: "http://localhost:8080/reload-configuration-as-code/"
    method: POST
    user: "{{ jenkins_admin_user }}"
    password: "{{ vault_jenkins_admin_password }}"
    force_basic_auth: yes
    status_code: 200
  register: jcasc_reload
  retries: 5
  delay: 5
  until: jcasc_reload.status == 200

# -----------------------------
# Strong JCasC verification (auth = success)
# -----------------------------
- name: Verify admin credentials (confirms JCasC applied successfully)
  uri:
    url: "http://localhost:8080/api/json"
    user: "{{ jenkins_admin_user }}"
    password: "{{ vault_jenkins_admin_password }}"
    force_basic_auth: yes
    status_code: 200
  register: jenkins_auth_check
  retries: 20 # increase retries to allow more time for Jenkins to apply config and be ready
  delay: 10
  until: jenkins_auth_check.status == 200
  failed_when: jenkins_auth_check.status != 200

# -----------------------------
# Verify JCasC UI (optional)
# -----------------------------
- name: Verify JCasC UI is accessible
  uri:
    url: "http://localhost:8080/manage/configuration-as-code/"
    user: "{{ jenkins_admin_user }}"
    password: "{{ vault_jenkins_admin_password }}"
    force_basic_auth: yes
    status_code: 200
  register: casc_page_check
  failed_when: casc_page_check.status != 200

- name: Print Jenkins access information
  debug:
    msg:
      - "Jenkins is fully configured and ready."
      - "URL     : http://{{ hostvars[groups['jenkins'][0]]['public_ip_address'] }}:8080"
      - "Username: {{ jenkins_admin_user }}"
      - "Password: (vault_jenkins_admin_password)"
      - "JCasC   : /var/lib/jenkins/casc_configs/jcasc.yaml"

# -----------------------------
# Correct debug condition variable
# -----------------------------
- name: Dump Jenkins logs if auth fails
  shell: journalctl -u jenkins -n 200
  when: jenkins_auth_check is failed