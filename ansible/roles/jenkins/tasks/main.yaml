# This Ansible playbook installs Jenkins on an Ubuntu server. It performs the following tasks:
---
- name: Install Java 21 (required by Jenkins)
  apt:
    name: openjdk-21-jdk
    state: present

# Creates the directory for storing apt keyrings if it doesn't already exist.
- name: Create apt keyrings directory
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

# Remove any old Jenkins keyring files to prevent conflicts with the new GPG key import and repository setup.
- name: Remove stale Jenkins key and repo files if present
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/jenkins.asc
    - /usr/share/keyrings/jenkins-keyring.gpg
    - /etc/apt/sources.list.d/jenkins.list

# Install Jenkins
# Add/Imports Jenkins GPG key to the system
- name: Import Jenkins GPG key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    dest: /tmp/jenkins.asc
    mode: '0644'

# Convert the downloaded Jenkins GPG key to a format suitable for apt and store it in the keyrings directory.
- name: Convert Jenkins key to gpg
  command: >
    gpg --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg /tmp/jenkins.asc
  args:
    creates: /usr/share/keyrings/jenkins-keyring.gpg

# Ensure the Jenkins GPG key has the correct permissions so that apt can read it when verifying packages from the Jenkins repository.
- name: Fix Jenkins key permissions
  file:
    path: /usr/share/keyrings/jenkins-keyring.gpg
    mode: '0644'

# Add the Jenkins apt repository to the system's sources list, referencing the imported GPG key for package verification.
- name: Add Jenkins apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins

# Update the apt cache to recognize the new Jenkins repository and its packages.
- name: Update apt cache
  apt:
    update_cache: yes

# Install the Jenkins package from the newly added repository, ensuring that the latest version is installed and the apt cache is updated beforehand.
- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes
  notify: restart jenkins

# Install plugins before start
- name: Copy Jenkins plugins list 
  copy:
    src: plugins.yaml
    dest: /tmp/plugins.yaml

- name: Download jenkins-plugin-cli
  get_url:
    url: "https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.12.13/jenkins-plugin-manager-2.12.13.jar"
    dest: /usr/local/lib/jenkins-plugin-manager.jar
    mode: '0644'

- name: Install jenkins-plugin-cli wrapper script
  copy:
    dest: /usr/local/bin/jenkins-plugin-cli
    mode: '0755'
    content: |
      #!/bin/bash
      exec java -jar /usr/local/lib/jenkins-plugin-manager.jar "$@"

- name: Install Jenkins plugins
  shell: |
    jenkins-plugin-cli --plugin-file /tmp/plugins.yaml \
      && touch /var/lib/jenkins/.plugins-installed
  args:
    creates: /var/lib/jenkins/.plugins-installed

# Add JCasC config
- name: Create JCasC configs directory # Create the casc_configs directory
  file:
    path: /var/lib/jenkins/casc_configs
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

# Copy JCasC config file to Jenkins server
- name: Copy JCasC config file to Jenkins server 
  copy:
    src: jcasc.yaml
    dest: /var/lib/jenkins/casc_configs/jcasc.yaml
    owner: jenkins
    group: jenkins
    mode: '0644'

# Ensure correct permissions
- name: Fix Jenkins home directory permissions
  file:
    path: /var/lib/jenkins
    owner: jenkins
    group: jenkins
    recurse: yes

# Set Jenkins environment variables
- name: Write /etc/default/jenkins — Java opts + JCasC env vars + credentials
  blockinfile:
    path: /etc/default/jenkins
    owner: root
    group: root
    mode: '0600'
    content: |
      # Jenkins startup configruation
      # ANSIBLE MANAGED — do not edit manually

      # JVM options
      JAVA_ARGS="-Djenkins.install.runSetupWizard=false"
      JENKINS_JAVA_OPTIONS="-Djava.awt.headless=true"

      # JCasC — points Jenkins at its configuration-as-code file on startup
      CASC_JENKINS_CONFIG=/var/lib/jenkins/casc_configs/jcasc.yaml

      # Jenkins admin identity (read by JCasC securityRealm block)
      JENKINS_ADMIN_USER={{ jenkins_admin_user }}
      JENKINS_ADMIN_PASSWORD={{ vault_jenkins_admin_password }}

      # Jenkins and SonarQube URLs for Jenkins pipeline configuration
      JENKINS_URL={{ ansible_host }}
      SONARQUBE_HOST={{ hostvars[groups['sonarqube'][0]]['ansible_host'] }}

      # Source control for Jenkins pipeline configuration
      GIT_REPO_URL={{ git_repo_url }}
      GITHUB_TOKEN={{ vault_github_token }}

      # SonarQube token for Jenkins pipeline configuration
      SONARQUBE_TOKEN={{ vault_sonar_token }}
      
      # AWS credentials for Jenkins pipeline configuration and Terraform AWS provider
      AWS_ACCESS_KEY_ID={{ vault_aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY={{ vault_aws_secret_access_key }}
  notify: restart jenkins

# Enables and starts the Jenkins service.
- name: Enable and start Jenkins
  service:
    name: jenkins
    state: started
    enabled: true

# Wait for Jenkins to start and listen on port 8080 before proceeding.
- name: Wait for Jenkins to start and listen on port 8080
  wait_for:
    port: 8080
    delay: 10
    timeout: 120