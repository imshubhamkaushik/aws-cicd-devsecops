# This Ansible playbook installs Jenkins on an Ubuntu server.
# Installs Jenkins on Ubuntu with JCasC (Configuration-as-Code).
# The setup wizard is disabled — Jenkins self-configures on first boot
# via /etc/default/jenkins (env vars) + casc_configs/jcasc.yaml.
# No manual browser unlock is required.
---
- name: Install Java 21 (required by Jenkins)
  apt:
    name: openjdk-21-jdk
    state: present

# Creates the directory for storing apt keyrings if it doesn't already exist.
- name: Create apt keyrings directory
  file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

# Install Jenkins
# Download key and dearmor in one shot — avoids intermediate file trust issues
# Use isolated GNUPGHOME to prevent gpg homedir permission issues when run as root
- name: Fetch Jenkins GPG key by fingerprint from keyserver
  shell: |
    set -e
    GNUPGHOME="$(mktemp -d)"
    trap "rm -rf $GNUPGHOME" EXIT

    gpg --homedir "$GNUPGHOME" --batch \
        --keyserver hkps://keyserver.ubuntu.com \
        --recv-keys 7198F4B714ABFC68

    gpg --homedir "$GNUPGHOME" --batch \
        --export 7198F4B714ABFC68 \
        > /usr/share/keyrings/jenkins-keyring.gpg

    test -s /usr/share/keyrings/jenkins-keyring.gpg \
      || { echo "ERROR: exported keyring is empty"; exit 1; }
  changed_when: true

- name: Fix Jenkins key permissions
  file:
    path: /usr/share/keyrings/jenkins-keyring.gpg
    mode: "0644"

# Add the Jenkins apt repository to the system's sources list, referencing the imported GPG key for package verification.
- name: Add Jenkins apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins
    update_cache: no

# Update the apt cache to recognize the new Jenkins repository and its packages.
- name: Update apt cache
  apt:
    update_cache: yes

# Install the Jenkins package from the newly added repository, ensuring that the latest version is installed and the apt cache is updated beforehand.
- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes

# -----------------------------
# Ensure directories exist
# -----------------------------

- name: Ensure JCasC config directory exists
  file:
    path: /var/lib/jenkins/casc_configs
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"

- name: Ensure plugins directory exists
  file:
    path: /var/lib/jenkins/plugins
    state: directory
    owner: jenkins
    group: jenkins

# -----------------------------
# Copy required files
# -----------------------------
- name: Copy plugins.yaml
  copy:
    src: plugins.yaml
    dest: /tmp/plugins.yaml

- name: Check if plugin manager already exists
  stat:
    path: /usr/local/lib/jenkins-plugin-manager.jar
  register: plugin_manager

- name: Download jenkins-plugin-manager.jar
  get_url:
    url: "https://github.com/jenkinsci/plugin-installation-manager-tool/releases/download/2.12.13/jenkins-plugin-manager-2.12.13.jar"
    dest: /usr/local/lib/jenkins-plugin-manager.jar
    mode: "0644"
  when: not plugin_manager.stat.exists

- name: Install jenkins-plugin-cli wrapper script
  copy:
    dest: /usr/local/bin/jenkins-plugin-cli
    mode: "0755"
    content: |
      #!/bin/bash
      exec java -jar /usr/local/lib/jenkins-plugin-manager.jar "$@"

- name: Configure Jenkins environment file
  template:
    src: jenkins_defaults.j2
    dest: /etc/default/jenkins
    mode: "0644"

# JCasC (Jenkins Configuration as Code) setup
# Deploy JCasC config file to Jenkins server
- name: Deploy JCasC config file to Jenkins server
  ansible.builtin.template:
    src: jcasc.yaml
    dest: /var/lib/jenkins/casc_configs/jcasc.yaml
    owner: jenkins
    group: jenkins
    mode: "0644"

# Ensure correct permissions
- name: Fix Jenkins home directory permissions
  file:
    path: /var/lib/jenkins
    owner: jenkins
    group: jenkins
    recurse: yes

# -----------------------------
# CRITICAL: systemd must load env
# -----------------------------

- name: Ensure systemd override directory exists
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory

- name: Configure systemd to load Jenkins env file
  copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      EnvironmentFile=/etc/default/jenkins

- name: Reload systemd daemon
  command: systemctl daemon-reload

- name: Install required packages for plugin downloads
  apt:
    name:
      - ca-certificates
      - curl
      - wget
    state: present

# -----------------------------
# Initialize Jenkins once BEFORE plugin install
# (Prevents plugin install race condition)
# -----------------------------
- name: Start Jenkins once to initialize home
  service:
    name: jenkins
    state: started

- name: Wait for initial Jenkins startup
  wait_for:
    port: 8080
    delay: 10
    timeout: 120

- name: Stop Jenkins before plugin install
  service:
    name: jenkins
    state: stopped

- name: Load plugin list
  ansible.builtin.include_vars:
    file: plugins.yaml

- name: Install Jenkins plugins
  community.general.jenkins_plugin:
    name: "{{ item.name }}"
    version: "{{ item.version | default(omit) }}"
    url_username: "{{ jenkins_admin_user }}"
    url_password: "{{ vaut_jenkins_admin_password }}"
    url: "http://localhost:8080"
    state: present
  with_items: "{{ jenkins_plugins }}"
  notify: Restart Jenkins

