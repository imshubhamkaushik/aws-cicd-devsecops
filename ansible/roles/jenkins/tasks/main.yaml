# -----------------------------
# Verify JCasC plugin exists
# -----------------------------
- name: Check JCasC plugin (.jpi or .hpi)
  shell: |
    ls /var/lib/jenkins/plugins | grep configuration-as-code || true
  register: casc_check

- name: Fail if JCasC plugin missing
  fail:
    msg: "JCasC plugin not installed"
  when: casc_check.stdout == ""

# -----------------------------
# Start Jenkins after full setup
# -----------------------------
- name: Start Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

# Flush handlers HERE — not at end-of-play — so Jenkins restarts (if config
# changed) BEFORE the wait tasks run. Without this, the handler would fire
# after all the wait/verify tasks have passed, leaving Jenkins in an
# unverified post-restart state.
- name: Flush handlers (restart Jenkins now if config changed)
  meta: flush_handlers

# Jenkins Unlock & First-Time Setup
# Wait for Jenkins to start and listen on port 8080 before proceeding.
- name: Wait for Jenkins to start and listen on port 8080
  wait_for:
    port: 8080
    delay: 5
    timeout: 300

- name: Wait for Jenkins web UI to respond (HTTP 200)
  uri:
    url: "http://localhost:8080/login"
    status_code: 200
  register: jenkins_ui
  retries: 30
  delay: 5
  until: jenkins_ui.status == 200

# -----------------------------
# FIX: Strong JCasC verification (auth = success)
# -----------------------------
- name: Verify admin credentials (confirms JCasC applied successfully)
  uri:
    url: "http://localhost:8080/api/json"
    user: "{{ jenkins_admin_user }}"
    password: "{{ vault_jenkins_admin_password }}"
    force_basic_auth: yes
    status_code: 200
  register: jenkins_auth_check
  retries: 20 # increase retries to allow more time for Jenkins to apply config and be ready
  delay: 10
  until: jenkins_auth_check.status == 200
  failed_when: jenkins_auth_check.status != 200

# -----------------------------
# Verify JCasC UI (optional)
# -----------------------------
- name: Verify JCasC UI is accessible
  uri:
    url: "http://localhost:8080/manage/configuration-as-code/"
    user: "{{ jenkins_admin_user }}"
    password: "{{ vault_jenkins_admin_password }}"
    force_basic_auth: yes
    status_code: 200
  register: casc_page_check
  failed_when: casc_page_check.status != 200

- name: Print Jenkins access information
  debug:
    msg:
      - "Jenkins is fully configured and ready."
      - "URL     : http://{{ hostvars[groups['jenkins'][0]]['public_ip_address'] }}:8080"
      - "Username: {{ jenkins_admin_user }}"
      - "Password: (vault_jenkins_admin_password)"
      - "JCasC   : /var/lib/jenkins/casc_configs/jcasc.yaml"

# -----------------------------
# Correct debug condition variable
# -----------------------------
- name: Dump Jenkins logs if auth fails
  shell: journalctl -u jenkins -n 200
  when: jenkins_auth_check is failed
