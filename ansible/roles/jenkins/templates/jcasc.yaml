jenkins:
  systemMessage: "Jenkins Bootstrap Mode (JCasC)"
  numExecutors: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  disableRememberMe: false

  crumbIssuer:
    standard: {}

unclassified:
  location:
    url: "http://${JENKINS_URL}:8080/"

  sonarGlobalConfiguration:
    installations:
      - name: "sonarqube"
        serverUrl: "http://${SONARQUBE_HOST}:9000"
        credentialsId: "sonarqube-token"

tool:
  git:
    installations:
      - name: "git"
        home: "/usr/bin/git"

  maven:
    installations:
      - name: "maven"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.9"

  nodejs:
    installations:
      - name: "node"
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "22.15.0"
                    npmPackagesRefreshHours: 72

credentials:
  system:
    domainCredentials:
      - credentials:
          # GitHub Token
          - string:
              scope: GLOBAL
              id: "github-token"
              secret: "${GITHUB_TOKEN}"
          # SonarQube Token
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "${SONARQUBE_TOKEN}"

# Job Definitions — both pipelines created automatically on Jenkins startup
jobs:
  # Platform Infra Pipeline
  - script: >
      pipelineJob('platform-infra') {
        description('Provision infrastructure using Terraform')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${GIT_REPO_URL}')
                  credentials('github-token')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile.platform-infra')
          }
        }
      }

  # Application CICD Pipeline
  - script: >
      pipelineJob('app-cicd') {
        description('Application CICD Pipeline - Build, Scan, Deploy')
        triggers {
          githubPush()
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${GIT_REPO_URL}')
                  credentials('github-token')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile.app-cicd')
          }
        }
      }
