---
# Tasks for installing DevOps tools like AWS CLI, kubectl, Helm, and Trivy
# Tool versions are defined in ansible/group_vars/all.yaml for single-source control and easy maintenance. 
# Ensure that the EC2 instances have access to the internet to download these tools

# -----------------------------
# AWS CLI
# -----------------------------
- name: Check AWS CLI installation
  command: aws --version
  register: aws_cli_check
  changed_when: false
  failed_when: false

- name: Download AWS CLI installer
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-{{ 'aarch64' if ansible_architecture == 'aarch64' else 'x86_64' }}.zip
    dest: /tmp/awscliv2.zip
    mode: '0644'
  when: aws_cli_check.rc != 0

- name: Unzip AWS CLI installer
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: yes
  when: aws_cli_check.rc != 0

- name: Install AWS CLI
  command: /tmp/aws/install
  when: aws_cli_check.rc != 0

# ------------------------------
# Kubernetes CLI (kubectl)
# ------------------------------
- name: Check kubectl version
  command: kubectl version --client --output=json
  register: kubectl_check
  changed_when: false
  failed_when: false

- name: Install kubectl {{ kubectl_version }}
  get_url:
    url: https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}/kubectl
    dest: /usr/local/bin/kubectl
    mode: '0755'
    force: true
  when: kubectl_version not in (kubectl_check.stdout | default(''))

# -----------------------------
# Helm
# -----------------------------
- name: Check Helm version
  command: helm version --short
  register: helm_check
  changed_when: false
  failed_when: false

# Set arch fact once so it's consistent across download and install tasks.
- name: Set Helm architecture fact
  set_fact:
    helm_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  when: helm_version not in (helm_check.stdout | default(''))

- name: Download Helm
  get_url:
    url: https://get.helm.sh/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz
    dest: /tmp/helm.tar.gz
    force: true
  when: helm_version not in (helm_check.stdout | default(''))

- name: Extract Helm Archive
  unarchive:
    src: /tmp/helm.tar.gz
    dest: /tmp
    remote_src: yes
  when: helm_version not in (helm_check.stdout | default(''))

- name: Install Helm binary
  copy:
    src: /tmp/linux-{{ helm_arch }}/helm
    dest: /usr/local/bin/helm
    mode: '0755'
    remote_src: yes
  when: helm_version not in (helm_check.stdout | default(''))

# -----------------------------
# Trivy
# -----------------------------
- name: Check Trivy version
  command: trivy --version
  register: trivy_check
  changed_when: false
  failed_when: false

- name: Download Trivy {{ trivy_version }} .deb package
  get_url:
    url: "https://github.com/aquasecurity/trivy/releases/download/v{{ trivy_version }}/trivy_{{ trivy_version }}_{{ 'Linux-ARM64.deb' if ansible_architecture == 'aarch64' else 'Linux-64bit.deb' }}"
    dest: /tmp/trivy.deb
    force: true
  when: trivy_version not in (trivy_check.stdout | default(''))

- name: Install Trivy from .deb package
  apt:
    deb: /tmp/trivy.deb
  when: trivy_version not in (trivy_check.stdout | default(''))

# -----------------------------
# Install Terraform
# -----------------------------
- name: Check if HashiCorp GPG keyring already exists
  stat:
    path: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  register: hashicorp_key_check

- name: Fetch HashiCorp GPG key
  shell: |
    set -e
    GNUPGHOME="$(mktemp -d)"
    trap "rm -rf $GNUPGHOME" EXIT

    curl -fsSL https://apt.releases.hashicorp.com/gpg \
      | gpg --homedir "$GNUPGHOME" --batch --import

    gpg --homedir "$GNUPGHOME" --batch \
      --export \
      > /tmp/hashicorp-keyring-new.gpg

    test -s /tmp/hashicorp-keyring-new.gpg \
      || { echo "ERROR: exported keyring is empty"; exit 1; }

    if ! diff -q /tmp/hashicorp-keyring-new.gpg \
         /usr/share/keyrings/hashicorp-archive-keyring.gpg &>/dev/null; then
      cp /tmp/hashicorp-keyring-new.gpg /usr/share/keyrings/hashicorp-archive-keyring.gpg
      echo "KEY_UPDATED"
    fi
  register: hashicorp_gpg_result
  changed_when: "'KEY_UPDATED' in hashicorp_gpg_result.stdout"
  when: not hashicorp_key_check.stat.exists

- name: Fix HashiCorp key permissions
  file:
    path: /usr/share/keyrings/hashicorp-archive-keyring.gpg
    mode: "0644"

- name: Add HashiCorp apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg arch={{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    state: present
    filename: hashicorp
    update_cache: no

- name: Update apt cache for HashiCorp repo
  apt:
    update_cache: yes

- name: Install Terraform
  apt:
    name: terraform
    state: present