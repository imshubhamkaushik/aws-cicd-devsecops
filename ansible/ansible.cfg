[defaults]
inventory = aws_ec2.yaml 
retry_files_enabled = False
remote_user = ubuntu
timeout = 30
interpreter_python = auto_silent
forks = 10
# Path is relative to this ansible.cfg file.
# The key is generated by Terraform (key-pair.tf) and saved alongside the .tf files.
private_key_file    = ../terraform/bootstrap-infra/catalogix-key.pem
roles_path = roles 
# This helps when projects scale.
collections_path = collections 
# This helps when projects scale.

[ssh_connection]
pipelining = True
# StrictHostKeyChecking=accept-new  — trusts new hosts on first connect, rejects changed keys.
# This is safer than 'no' which silently accepts changed keys (MITM risk).
ssh_args = -o StrictHostKeyChecking=accept-new