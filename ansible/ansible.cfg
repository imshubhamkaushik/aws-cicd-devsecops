[defaults]
inventory = aws_ec2.yaml 
host_key_checking = False # EC2 instances get new host keys on every recreation — disabling avoids interactive prompts in CI
retry_files_enabled = False
remote_user = ubuntu
timeout = 30
interpreter_python = auto_silent
forks = 10
roles_path = roles # This helps when projects scale.
collections_path = collections # This helps when projects scale.

[ssh_connection]
pipelining = True