[defaults]
inventory = aws_ec2.yaml 
retry_files_enabled = False
remote_user = ubuntu
timeout = 30
interpreter_python = auto_silent
forks = 10
roles_path = roles # This helps when projects scale.
collections_path = collections # This helps when projects scale.

[ssh_connection]
pipelining = True
ssh_args = -o StrictHostKeyChecking=accept-new