[defaults]
inventory = aws_ec2.yaml 
retry_files_enabled = False
remote_user = ubuntu
timeout = 30
interpreter_python = auto_silent
forks = 10
# Generated locally with ssh-keygen (see create-key-pair.sh) — never by
# Terraform. Terraform only ever receives the public half (see key-pair.tf).
# ~ expands to your home directory; no change needed if you used the script.
private_key_file    = ~/.ssh/catalogix-key
roles_path = roles 
# This helps when projects scale.
collections_path = collections 
# This helps when projects scale.
deprecation_warnings = False

[ssh_connection]
pipelining = True
# StrictHostKeyChecking=accept-new  — trusts new hosts on first connect, rejects changed keys.
# This is safer than 'no' which silently accepts changed keys (MITM risk).
ssh_args = -o StrictHostKeyChecking=accept-new