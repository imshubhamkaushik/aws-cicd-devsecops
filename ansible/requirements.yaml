# The sonarqube role uses the docker_container module which lives in the community.docker collection.
# Without declaring it here, running the playbook throws:
#   "couldn't resolve module/action 'community.docker.docker_container'"
#
# Install before running the playbook:
#   ansible-galaxy collection install -r requirements.yml

collections:
  - name: community.docker
    version: ">=7.5.0"
  - name: amazon.aws
    version: ">=8.2.0"