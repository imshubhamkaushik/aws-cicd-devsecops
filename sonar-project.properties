# =============================================================================
# SonarQube — Unified analysis for all Catalogix services
# Scanned by sonar-scanner-cli Docker image in Jenkinsfile.app-cicd.
# One project key, one dashboard, one quality gate for the whole monorepo.
# =============================================================================

sonar.projectKey=catalogix
sonar.projectName=Catalogix — All Services

# -----------------------------------------------------------------------------
# Sources
# All three services defined here so the scanner covers the entire codebase
# in a single pass rather than three separate scans.
# -----------------------------------------------------------------------------
sonar.sources=user-svc/src/main/java,product-svc/src/main/java,frontend-svc/src

# -----------------------------------------------------------------------------
# Java bytecode — required for accurate Java analysis (type resolution,
# dataflow, etc.). Points at the compiled output from the Build Artifacts stage.
# The scanner errors out on Java sources without this.
# -----------------------------------------------------------------------------
sonar.java.binaries=user-svc/target/classes,product-svc/target/classes

# -----------------------------------------------------------------------------
# Test sources + bytecode — lets SonarQube distinguish test code from
# production code and report test coverage correctly.
# -----------------------------------------------------------------------------
sonar.tests=user-svc/src/test/java,product-svc/src/test/java
sonar.java.test.binaries=user-svc/target/test-classes,product-svc/target/test-classes

# -----------------------------------------------------------------------------
# Frontend — sonar-scanner-cli auto-detects .js/.jsx via the sources path
# above, but being explicit avoids picking up generated files under build/.
# -----------------------------------------------------------------------------
sonar.javascript.file.suffixes=.js,.jsx

# Exclude build output, test resources, and generated files from analysis
sonar.exclusions=\
    frontend-svc/build/**,\
    frontend-svc/node_modules/**,\
    **/target/**,\
    **/*.min.js

# SCM info is not available inside the Docker container
sonar.scm.disabled=true
